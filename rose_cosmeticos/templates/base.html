<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ config.nome_loja }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="site-header">
  <div class="wrap header-inner">
    <a href="/" class="brand">
      <span class="brand-flower" aria-hidden="true">✿</span>
      <span class="brand-name">{{ config.nome_loja }}</span>
    </a>
    <p class="brand-slogan">{{ config.slogan }}</p>
    <a class="whatsapp-pill" target="_blank"
       href="https://wa.me/{{ config.whatsapp }}?text=Ol%C3%A1!%20Vim%20pelo%20site%20e%20quero%20saber%20mais%20sobre%20os%20produtos.">
      Fale conosco
    </a>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-flower" aria-hidden="true">✿</div>
    <p class="footer-title">{{ config.nome_loja }}</p>
    <p class="footer-text">Produtos de beleza e cuidado íntimo, com carinho para você.</p>
    <div class="footer-links">
      <a target="_blank" href="https://wa.me/{{ config.whatsapp }}">WhatsApp</a>
      <span class="dot">•</span>
      <a target="_blank" href="https://instagram.com/{{ config.instagram }}">@{{ config.instagram }}</a>
    </div>
    <p class="footer-copy">© {{ config.nome_loja }} — feito com carinho.</p>
  </div>
</footer>

</body>
</html>
